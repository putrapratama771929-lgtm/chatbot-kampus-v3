<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — Asisten Virtual Polimdo</title>
  <meta name="description" content="Tanya bot Polimdo tentang jurusan, biaya kuliah, pendaftaran, dan beasiswa.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/chat.css">

  <!-- Theme (load early) -->
  <script src="js/theme.js"></script>
</head>
<body>

  <div class="chat-layout">

    <!-- ===== CHAT HEADER ===== -->
    <header class="chat-header">
      <div class="chat-header-left">
        <a href="index.html" class="chat-back-btn" id="back-btn">
          ← <span>Kembali</span>
        </a>
        <div class="chat-header-info">
          <div class="chat-header-title">Asisten Polimdo</div>
          <div class="chat-header-status">
            <span class="status-dot"></span>
            Online
          </div>
        </div>
      </div>
      <div class="chat-header-actions">
        <button class="btn-icon" id="clear-btn" aria-label="Hapus chat" title="Hapus Chat">🗑️</button>
        <button class="btn-icon theme-toggle" aria-label="Toggle tema">☀️</button>
      </div>
    </header>

    <!-- ===== CHAT MESSAGES ===== -->
    <div class="chat-messages" id="chat-messages">

      <!-- Welcome State -->
      <div class="chat-welcome" id="chat-welcome">
        <div class="chat-welcome-avatar">🤖</div>
        <h2 class="chat-welcome-title">Halo! Saya Asisten Polimdo 👋</h2>
        <p class="chat-welcome-text">
          Saya bisa membantu kamu mendapatkan informasi seputar Politeknik Negeri Manado. Silakan ketik pertanyaan atau pilih topik di bawah!
        </p>
        <div class="chat-welcome-topics">
          <span class="topic-tag">🎓 Jurusan</span>
          <span class="topic-tag">💰 Biaya</span>
          <span class="topic-tag">📝 Pendaftaran</span>
          <span class="topic-tag">🏅 Beasiswa</span>
          <span class="topic-tag">📍 Lokasi</span>
          <span class="topic-tag">📞 Kontak</span>
        </div>
      </div>

    </div>

    <!-- ===== QUICK ACTIONS ===== -->
    <div class="chat-quick-actions">
      <button class="quick-action-btn" data-query="Apa saja jurusan di Polimdo?">🎓 Jurusan</button>
      <button class="quick-action-btn" data-query="Berapa biaya kuliah?">💰 Biaya Kuliah</button>
      <button class="quick-action-btn" data-query="Bagaimana cara mendaftar?">📝 Pendaftaran</button>
      <button class="quick-action-btn" data-query="Ada beasiswa apa saja?">🏅 Beasiswa</button>
      <button class="quick-action-btn" data-query="Dimana lokasi kampus?">📍 Lokasi</button>
      <button class="quick-action-btn" data-query="Hubungi admin">📞 Kontak</button>
    </div>

    <!-- ===== CHAT INPUT ===== -->
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <input
          type="text"
          class="chat-input"
          id="chat-input"
          placeholder="Ketik pertanyaan kamu..."
          autocomplete="off"
        >
        <button class="chat-send-btn" id="send-btn" aria-label="Kirim pesan" disabled>
          ➤
        </button>
      </div>
    </div>

  </div>

  <!-- JS (order matters: data → engine → chat) -->
  <script src="js/data.js"></script>
  <script src="js/chatEngine.js"></script>
  <script src="js/chat.js"></script>

</body>
</html>
