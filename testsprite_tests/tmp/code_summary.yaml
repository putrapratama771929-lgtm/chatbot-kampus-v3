version: "2"
type: frontend
tech_stack:
  - HTML5
  - CSS3
  - Vanilla JavaScript
  - Express static server
  - REST API integration with offline local fallback
routes:
  - path: /
    file: index.html
    auth_required: false
    description: Landing page for Chatbot Polimdo with navigation, hero CTA, feature cards, campus information accordions, FAQ accordions, theme toggle, and links to the chat page.
  - path: /chat.html
    file: chat.html
    auth_required: false
    description: Chat interface for asking the Polimdo virtual assistant about programs, tuition, registration, scholarships, location, facilities, academic schedule, accreditation, and contacts.
features:
  - name: Landing Page Navigation
    description: Visitors can browse the public landing page, open campus information sections, use FAQ accordions, switch themes, and navigate into the chatbot.
    files:
      - index.html
      - js/landing.js
      - js/theme.js
      - css/landing.css
      - css/components.css
    entry_route: /
    user_interactions:
      - Click navbar links for Tentang and FAQ anchors
      - Open and close accordion items in Tentang Kampus and FAQ sections
      - Toggle light and dark theme
      - Click Mulai Chat buttons or floating chat button to open chat.html
      - On mobile, open the hamburger menu and choose a menu item
    api_calls: []
    auth_required: false
  - name: Chat Session Initialization
    description: The chat page attempts to create a backend chat session and shows online, connecting, or offline mode based on API availability.
    files:
      - chat.html
      - js/chat.js
      - server/src/routes/chat.ts
      - server/src/services/chatSessionService.ts
    entry_route: /chat.html
    user_interactions:
      - Open chat.html
      - Observe welcome panel and connection status
      - Wait for online status after session creation
      - See offline status if the API cannot be reached
    api_calls:
      - method: POST
        endpoint: /api/chat/session
    auth_required: false
  - name: Chat Question And Response
    description: Users can type a question or click quick action chips, submit the message, and receive a bot response rendered as text, info card, or fallback contact card.
    files:
      - chat.html
      - js/chat.js
      - js/chatEngine.js
      - js/data.js
      - server/src/routes/chat.ts
      - server/src/services/chatEngine.ts
      - server/src/services/intentResolver.ts
    entry_route: /chat.html
    user_interactions:
      - Type a question in the chat input
      - Click the send button or press Enter
      - Click quick action buttons for Jurusan, Biaya Kuliah, Pendaftaran, Beasiswa, Lokasi, and Kontak
      - Watch the typing indicator
      - Read the bot answer and generated info or fallback cards
      - Confirm the send button is disabled for an empty input and enabled after typing
    api_calls:
      - method: POST
        endpoint: /api/chat/message
    auth_required: false
  - name: Clear Chat
    description: Users can clear the visible chat, restore the welcome state, delete the current backend session when online, and create a fresh session.
    files:
      - chat.html
      - js/chat.js
      - server/src/routes/chat.ts
    entry_route: /chat.html
    user_interactions:
      - Send at least one chat message
      - Click the clear chat button
      - Verify chat bubbles are removed and the welcome state returns
      - Verify input is emptied and send button returns to disabled state
    api_calls:
      - method: DELETE
        endpoint: /api/chat/session/:sessionId
      - method: POST
        endpoint: /api/chat/session
    auth_required: false
  - name: Theme Persistence
    description: Users can toggle light and dark theme; the chosen theme is persisted in localStorage and reflected on both landing and chat pages.
    files:
      - js/theme.js
      - index.html
      - chat.html
      - css/variables.css
    entry_route: /
    user_interactions:
      - Toggle the theme button on the landing page
      - Navigate to chat.html
      - Verify the selected theme remains active
      - Toggle the theme again from the chat header
    api_calls: []
    auth_required: false
known_limitations:
  - issue: When served only by Apache on port 80, frontend API calls target http://localhost/api and fall back to offline mode unless Apache is configured to proxy to the Node backend.
    location: js/chat.js
    impact: Backend chat session and message APIs are not exercised from the browser in that deployment mode.
  - issue: The offline local chat engine uses static client-side data and does not persist chat sessions or message history.
    location: js/chatEngine.js
    impact: Offline mode provides answers but cannot validate backend persistence behavior.
