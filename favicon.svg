<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E7FF"/>
      <stop offset="100%" style="stop-color:#C7D2FE"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Robot head -->
  <rect x="16" y="18" width="32" height="28" rx="8" fill="url(#face)"/>
  <!-- Antenna -->
  <line x1="32" y1="18" x2="32" y2="10" stroke="#93C5FD" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="8" r="3" fill="#60A5FA"/>
  <!-- Eyes -->
  <circle cx="24" cy="30" r="4" fill="#3B82F6"/>
  <circle cx="40" cy="30" r="4" fill="#3B82F6"/>
  <circle cx="25" cy="29" r="1.5" fill="#fff"/>
  <circle cx="41" cy="29" r="1.5" fill="#fff"/>
  <!-- Mouth -->
  <rect x="24" y="37" width="16" height="4" rx="2" fill="#3B82F6"/>
  <rect x="28" y="37" width="2" height="4" fill="url(#face)"/>
  <rect x="34" y="37" width="2" height="4" fill="url(#face)"/>
</svg>
